name: Deploy Dev

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - dev
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Image SHA to deploy (optional, defaults to triggering commit)"
        required: false
        type: string

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.image_sha }}" ]; then
            echo "tag=${{ github.event.inputs.image_sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy container image to Azure Web App (dev)
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/${{ github.event.repository.name }}:${{ steps.image.outputs.tag }}
