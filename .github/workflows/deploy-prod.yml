name: Deploy to prod

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Image SHA to deploy (optional, defaults to triggering commit)"
        required: false
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.image_sha }}" ]; then
            echo "tag=${{ github.event.inputs.image_sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_USERNAME }}.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Wait for image tag in registry
        shell: bash
        run: |
          IMAGE="${{ secrets.REGISTRY_USERNAME }}.azurecr.io/${{ github.event.repository.name }}:${{ steps.image.outputs.tag }}"
          echo "Waiting for image: $IMAGE"

          for i in {1..30}; do
            if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              echo "Image is available."
              exit 0
            fi

            echo "Image not available yet (attempt $i/30), waiting 20s..."
            sleep 20
          done

          echo "::error::Image $IMAGE was not found after waiting."
          exit 1

      - name: Deploy container image to Azure Web App (prod)
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/${{ github.event.repository.name }}:${{ steps.image.outputs.tag }}
