# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: build and deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Sync dependencies
      run: uv sync --frozen --group dev

    - name: Lint
      run: uv run ruff check .

    - name: Run tests
      run: uv run pytest tests -v

  build:
    runs-on: 'ubuntu-latest'
    needs: quality
    defaults:
      run:
        working-directory: .

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.REGISTRY_USERNAME }}.azurecr.io
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and push container image to container registry
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: |
          ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/${{ vars.AZURE_WEBAPP_NAME }}:${{ github.sha }}
          ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/${{ vars.AZURE_WEBAPP_NAME }}:latest
        file: Dockerfile
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy container image to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        slot-name: 'production'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/${{ vars.AZURE_WEBAPP_NAME }}:${{ github.sha }}
